<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JUJUTSU KAISEN - ARENA SAGRADA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html, body {
  background: #000;
  font-family: 'Orbitron', 'Arial', sans-serif;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  user-select: none;
  touch-action: manipulation;
  position: fixed;
  top: 0;
  left: 0;
}

#game-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
}

canvas {
  width: 100vw !important;
  height: 100vh !important;
  display: block;
  position: fixed;
  top: 0;
  left: 0;
}

/* HUD */
#hud-top {
  position: fixed; top: 5px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 6px; z-index: 100;
  background: rgba(0,0,0,0.85); border: 2px solid #ffd700;
  border-radius: 8px; padding: 3px 8px;
}
.player-hud { display: flex; align-items: center; gap: 3px; }
.player-hud.right { flex-direction: row-reverse; }
.hud-avatar { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ffd700; display: flex; align-items: center; justify-content: center; font-size: 11px; background: rgba(0,0,0,0.7); }
.hud-name { font-size: 7px; font-weight: 900; color: #fff; }
.hp-bar-mk { width: 70px; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; border: 1px solid #444; }
.hp-fill-mk { height: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: width 0.3s; }
.ce-bar-mk { width: 70px; height: 3px; background: #0a0a1a; border-radius: 2px; overflow: hidden; border: 1px solid #1a237e; }
.ce-fill-mk { height: 100%; background: linear-gradient(90deg, #2980b9, #3498db); transition: width 0.3s; }
#vs-divider { font-size: 11px; font-weight: 900; color: #ffd700; }
#timer-mk { font-size: 13px; font-weight: 900; color: #fff; min-width: 20px; text-align: center; }
#combo-mk { font-size: 9px; color: #ffd700; min-width: 35px; text-align: center; font-weight: bold; }

#message-mk {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85); border: 2px solid #ffd700; border-radius: 8px;
  padding: 6px 12px; font-size: 10px; color: #ffd700; text-align: center;
  z-index: 200; display: none; font-weight: bold;
}
#tower-display {
  position: fixed; top: 38px; left: 50%; transform: translateX(-50%);
  color: #ffd700; font-size: 7px; font-weight: bold; z-index: 100; display: none;
}

/* CONTROLES */
#mobile-controls {
  position: fixed; bottom: 5px; left: 0; right: 0;
  display: flex; justify-content: space-between;
  padding: 0 10px; z-index: 300; pointer-events: none;
}
.control-group { display: flex; gap: 3px; pointer-events: auto; }
.control-dpad {
  display: grid;
  grid-template-areas: ". up ." "left . right" ". down .";
  grid-template-columns: 40px 40px 40px;
  grid-template-rows: 40px 40px 40px;
  gap: 2px;
}
.mobile-btn {
  width: 40px; height: 40px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.7); color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; touch-action: manipulation;
}
.mobile-btn:active, .mobile-btn.pressed { background: rgba(138,43,226,0.7); border-color: #ffd700; transform: scale(0.9); }
.action-buttons { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
.action-row { display: flex; gap: 3px; }
.action-btn {
  width: 45px; height: 45px; border-radius: 50%; border: 3px solid;
  font-size: 10px; font-weight: 900; font-family: 'Orbitron', Arial, sans-serif;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
}
.action-btn:active, .action-btn.pressed { transform: scale(0.85); }
.btn-attack { background: rgba(220,20,60,0.7); border-color: #ff4444; color: #fff; }
.btn-special { background: rgba(138,43,226,0.7); border-color: #bb44ff; color: #fff; }
.btn-dash { background: rgba(255,215,0,0.7); border-color: #ffd700; color: #000; }

/* SELEÇÃO */
.selection-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.97); z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 8px 5px; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.selection-title { font-size: 14px; font-weight: 900; color: #ffd700; text-align: center; width: 100%; margin-bottom: 2px; }
.selection-subtitle { font-size: 7px; color: #888; margin-bottom: 5px; text-align: center; width: 100%; }

.character-grid-mk3 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; width: 100%; max-width: 550px; padding: 0 2px; }
.char-card-mk3 {
  width: 100%; aspect-ratio: 0.9; min-height: 75px;
  background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
  border: 2px solid #2a2a4a; cursor: pointer; transition: all 0.1s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 6px; -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; position: relative; z-index: 1;
}
.char-card-mk3:active { border-color: #8A2BE2; background: linear-gradient(180deg, #2a1a4e 0%, #1a0a2e 100%); transform: scale(1.03); }
.char-card-mk3.selected { border-color: #ffd700; background: linear-gradient(180deg, #3a2a00 0%, #1a0a00 100%); box-shadow: 0 0 12px rgba(255,215,0,0.5); }
.char-avatar-mk3 { font-size: 24px; margin-bottom: 1px; }
.char-name-mk3 { font-size: 6px; font-weight: 900; color: #fff; text-align: center; line-height: 1.1; }
.char-title-mk3 { font-size: 5px; color: #ffd700; text-align: center; }
.char-stats-mk3 { display: flex; gap: 3px; margin-top: 1px; }
.char-stat-mk3 { font-size: 5px; color: #aaa; text-align: center; }
.char-stat-val-mk3 { font-size: 7px; font-weight: bold; color: #fff; }
.char-power-mk3 { font-size: 4px; color: #8A2BE2; margin-top: 1px; background: rgba(138,43,226,0.2); padding: 1px 2px; border-radius: 3px; max-width: 70px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

.diff-select { display: flex; gap: 5px; margin: 6px 0; width: 100%; max-width: 450px; justify-content: center; }
.diff-btn {
  padding: 6px 10px; border-radius: 6px; border: 2px solid #555;
  background: #1a1a2e; color: #fff; font-size: 9px; font-weight: 900;
  cursor: pointer; font-family: 'Orbitron', Arial, sans-serif;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  flex: 1; text-align: center; max-width: 100px;
}
.diff-btn:active { border-color: #ffd700; }
.diff-btn.selected { border-color: #ffd700; background: #3a2a00; }

.goty-btn {
  background: linear-gradient(135deg, #8A2BE2, #6B2FA0); color: #fff; border: 2px solid #ffd700;
  padding: 8px 20px; font-size: 12px; font-weight: 900;
  cursor: pointer; border-radius: 8px; transition: all 0.2s;
  text-transform: uppercase; letter-spacing: 1px; margin: 3px; 
  font-family: 'Orbitron', Arial, sans-serif;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.goty-btn:active { transform: scale(0.95); }
.goty-btn.start-btn { background: linear-gradient(135deg, #ffd700, #ff8c00); font-size: 13px; padding: 10px 25px; margin-top: 6px; width: 80%; max-width: 300px; }

.result-overlay, .game-over-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.result-title { font-size: 20px; font-weight: 900; color: #ffd700; text-align: center; }
.result-subtitle { font-size: 11px; color: #fff; text-align: center; }
.result-winner { font-size: 15px; color: #2ecc71; font-weight: bold; }
.result-buttons { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.game-over-title { font-size: 28px; font-weight: 900; color: #ff1744; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }

.result-btn {
  background: linear-gradient(135deg, #8A2BE2, #6B2FA0); color: #fff; border: 2px solid #ffd700;
  padding: 7px 14px; font-size: 10px; font-weight: 900;
  cursor: pointer; border-radius: 8px; transition: all 0.2s;
  text-transform: uppercase; letter-spacing: 1px; font-family: 'Orbitron', Arial, sans-serif;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.result-btn:active { transform: scale(0.95); }
.result-btn.rematch { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.result-btn.character { background: linear-gradient(135deg, #2ecc71, #27ae60); }

#boss-alert {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(139,0,0,0.95); border: 3px solid #ff1744; border-radius: 10px;
  padding: 8px 14px; z-index: 300; text-align: center; display: none;
  animation: bossPulse 0.5s infinite;
}
@keyframes bossPulse { 0%,100%{box-shadow:0 0 20px rgba(255,23,68,0.8)} 50%{box-shadow:0 0 40px rgba(255,23,68,1)} }
.boss-alert-title { font-size: 18px; font-weight: 900; color: #ffd700; }
.boss-alert-subtitle { font-size: 9px; color: #fff; margin-top: 2px; }

#audio-controls { position: fixed; top: 3px; right: 3px; z-index: 600; display: flex; gap: 2px; }
.audio-btn {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ffd700;
  background: rgba(0,0,0,0.8); color: #ffd700; font-size: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.audio-btn.muted { opacity: 0.4; border-color: #555; color: #555; }
</style>
</head>
<body>

<div id="game-container"><canvas id="g"></canvas></div>

<div id="audio-controls">

</div>

<div id="hud-top" style="display:none;">

      <button class="mobile-btn" style="grid-area:down;" id="btn-down" ontouchstart="mobileKeyDown('s')" ontouchend="mobileKeyUp('s')">▼</button>
    </div>
  </div>
  <div class="control-group action-buttons">

      <button class="action-btn btn-attack" id="btn-attack" ontouchstart="mobileKeyDown('x')" ontouchend="mobileKeyUp('x')">SOC</button>
      <button class="action-btn btn-special" id="btn-special" ontouchstart="mobileKeyDown('c')" ontouchend="mobileKeyUp('c')">POD</button>

    <button class="action-btn btn-dash" id="btn-dash" ontouchstart="mobileKeyDown('v')" ontouchend="mobileKeyUp('v')">DASH</button>

</div>

const AudioSystem={initialized:false,musicEnabled:true,sfxEnabled:true,volume:0.1,bgMusicNodes:[],jjkThemeInterval:null,init(){try{this.audioCtx=new(window.AudioContext||window.webkitAudioContext)();this.initialized=true;}catch(e){}},resume(){if(this.audioCtx?.state==='suspended')this.audioCtx.resume();},playNote(f,t,d,v=0.1,s=0){if(!this.sfxEnabled||!this.initialized)return;try{const o=this.audioCtx.createOscillator(),g=this.audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,this.audioCtx.currentTime+s);g.gain.setValueAtTime(v*this.volume,this.audioCtx.currentTime+s);g.gain.exponentialRampToValueAtTime(0.001,this.audioCtx.currentTime+s+d);o.connect(g);g.connect(this.audioCtx.destination);o.start(this.audioCtx.currentTime+s);o.stop(this.audioCtx.currentTime+s+d);}catch(e){}},punch(){this.playNote(120,'square',0.05,0.04);},dash(){this.playNote(400,'sine',0.1,0.02);},special(){this.playNote(40,'sawtooth',0.5,0.1);},domain(){for(let i=0;i<6;i++)this.playNote(25+i*5,'sawtooth',0.15,0.03,i*0.04);},hurt(){this.playNote(180,'sawtooth',0.1,0.04);},victory(){[523,659,784].forEach((f,i)=>this.playNote(f,'sine',0.25,0.08,i*0.12));},defeat(){[400,350,300].forEach((f,i)=>this.playNote(f,'sine',0.3,0.06,i*0.15));},bossAppear(){for(let i=0;i<6;i++)this.playNote(25+i*5,'sawtooth',0.15,0.04,i*0.06);},menuClick(){this.playNote(600,'sine',0.03,0.02);},select(){this.playNote(500,'sine',0.04,0.02);},playJJKTheme(){this.stopAllMusic();if(!this.musicEnabled)return;const m=[659,659,659,587,523,587,659,587];let i=0;this.jjkThemeInterval=setInterval(()=>{if(gameState!=='menu'||!this.musicEnabled){clearInterval(this.jjkThemeInterval);return;}this.playNote(m[i%m.length],'sine',0.12,0.03);i++;},200);},playBattleMusic(){this.stopAllMusic();if(!this.musicEnabled)return;const m=[196,220,246,261];let i=0;const iv=setInterval(()=>{if(gameState!=='playing'||!this.musicEnabled){clearInterval(iv);return;}this.playNote(m[i%m.length],'sawtooth',0.08,0.02);i++;},180);this.bgMusicNodes.push({id:iv});},playBossMusic(){this.stopAllMusic();if(!this.musicEnabled)return;const m=[130,146,164,196];let i=0;const iv=setInterval(()=>{if(gameState!=='playing'||!this.musicEnabled){clearInterval(iv);return;}this.playNote(m[i%m.length],'sawtooth',0.12,0.03);i++;},160);this.bgMusicNodes.push({id:iv});},stopAllMusic(){if(this.jjkThemeInterval)clearInterval(this.jjkThemeInterval);this.bgMusicNodes.forEach(n=>clearInterval(n.id));this.bgMusicNodes=[];},toggleMusic(){this.musicEnabled=!this.musicEnabled;const b=document.getElementById('btn-music');this.musicEnabled?b.classList.remove('muted'):b.classList.add('muted');if(!this.musicEnabled)this.stopAllMusic();else if(gameState==='menu')this.playJJKTheme();},toggleSFX(){this.sfxEnabled=!this.sfxEnabled;const b=document.getElementById('btn-sfx');this.sfxEnabled?b.classList.remove('muted'):b.classList.add('muted');}};

function mobileKeyDown(key){keys[key]=true;const btnMap={w:'btn-up',a:'btn-left',s:'btn-down',d:'btn-right',x:'btn-attack',c:'btn-special',v:'btn-dash'};const btnId=btnMap[key];if(btnId){const btn=document.getElementById(btnId);if(btn)btn.classList.add('pressed');}AudioSystem.init();AudioSystem.resume();if(gameState==='menu'&&AudioSystem.musicEnabled)AudioSystem.playJJKTheme();}
function mobileKeyUp(key){keys[key]=false;const btnMap={w:'btn-up',a:'btn-left',s:'btn-down',d:'btn-right',x:'btn-attack',c:'btn-special',v:'btn-dash'};const btnId=btnMap[key];if(btnId){const btn=document.getElementById(btnId);if(btn)btn.classList.remove('pressed');}}

class JujutsuFighter{
  constructor(x,y,c,cpu,diff,boss=false){this.x=x;this.y=y;this.vx=0;this.vy=0;this.facingRight=true;this.name=c.name;this.avatar=c.avatar;this.color=c.color;this.skinColor=c.skinColor;this.hairColor=c.hairColor;this.hairStyle=c.hairStyle;this.accessory=c.accessory;this.weapon=c.weapon;this.weaponIcon=c.weaponIcon;this.powerName=c.power;this.powerColor=c.powerColor;this.powerType=c.powerType||'domain';this.domainType=c.domainType||'malevolent_shrine';this.maxHP=c.hp;this.hp=c.hp;this.speed=c.speed;this.jumpPower=c.jump;this.dashDistance=c.dashDist;this.dashCooldown=c.dashCD;this.meleeDmg=c.meleeDmg;this.meleeRange=c.meleeRange;this.specialDmg=c.specialDmg;this.ceGainOnHit=c.ceGainOnHit||15;this.ceGainOnDamage=c.ceGainOnDamage||15;this.cursedEnergy=0;this.maxCE=100;this.grounded=false;this.attacking=false;this.attackTimer=0;this.dashTimer=0;this.invincible=0;this.hitStun=0;this.damageFlash=0;this.auraActive=0;this.isCPU=cpu;this.cpuTimer=0;this.cpuAction='idle';this.alive=true;this.isBoss=boss;this.heavenlyBuff=0;this.jackpotActive=0;if(boss){this.diffMultiplier=1.3;this.diffAggression=0.8;}else if(cpu&&diff){this.diffMultiplier=diff==='easy'?0.5:diff==='hard'?1.4:1.0;this.diffAggression=diff==='easy'?0.25:diff==='hard'?0.9:0.6;}this.walkCycle=0;this.comboHits=0;}
  update(ctrl,opps){if(!this.alive)return;if(this.invincible>0)this.invincible--;if(this.dashTimer>0)this.dashTimer--;if(this.attackTimer>0){this.attackTimer--;if(this.attackTimer<=0)this.attacking=false;}if(this.hitStun>0){this.hitStun--;return;}if(this.damageFlash>0)this.damageFlash--;if(this.auraActive>0)this.auraActive--;if(this.heavenlyBuff>0)this.heavenlyBuff--;if(this.jackpotActive>0){this.jackpotActive--;this.hp=Math.min(this.maxHP,this.hp+2);}this.vx=0;let co=null,cd=Infinity;for(const o of opps){if(!o.alive||o===this)continue;const dx=o.x-this.x,dy=o.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cd=d;co=o;}}if(!co)return;if(this.isCPU){const dx=co.x-this.x,dist=Math.abs(dx),ag=this.diffAggression||0.6;this.cpuTimer--;if(this.cpuTimer<=0){this.cpuTimer=Math.floor(15/(ag+0.2))+Math.floor(Math.random()*12);if(this.cursedEnergy>=100&&Math.random()<0.3*ag)this.cpuAction='special';else if(dist<this.meleeRange+15&&Math.random()<0.7)this.cpuAction='attack';else if(dist>200&&Math.random()<0.4*ag)this.cpuAction='dash';else this.cpuAction='move';}if(this.cpuAction==='move'){if(dist>50){this.vx=dx>0?this.speed*(this.diffMultiplier||1):-this.speed*(this.diffMultiplier||1);this.facingRight=dx>0;}if(co.y<this.y-30&&this.grounded&&dist<250){this.vy=-this.jumpPower;this.grounded=false;}}else if(this.cpuAction==='attack'){this.meleeAttack(co);this.cpuAction='move';}else if(this.cpuAction==='special'){this.specialAttack(co,opps);this.cpuAction='move';}else if(this.cpuAction==='dash'&&this.dashTimer<=0){this.facingRight=dx>0;this.performDash();}}else{if(keys[ctrl.left]){this.vx=-this.speed;this.facingRight=false;}if(keys[ctrl.right]){this.vx=this.speed;this.facingRight=true;}if(keys[ctrl.jump]&&this.grounded){this.vy=-this.jumpPower;this.grounded=false;}if(keys[ctrl.attack]&&this.attackTimer<=0)this.meleeAttack(co);if(keys[ctrl.special]&&this.attackTimer<=0)this.specialAttack(co,opps);if(keys[ctrl.dash]&&this.dashTimer<=0)this.performDash();}this.vy+=0.7;this.y+=this.vy;this.x+=this.vx;if(this.y>=GROUND-50){this.y=GROUND-50;this.vy=0;this.grounded=true;}this.x=Math.max(25,Math.min(W-25,this.x));if(Math.abs(this.vx)>4)this.walkCycle+=0.35;else this.walkCycle*=0.8;}
  performDash(){AudioSystem.dash();this.vx=(this.facingRight?1:-1)*this.dashDistance;this.vy=-8;this.dashTimer=this.dashCooldown;this.invincible=12;for(let i=0;i<15;i++)particles.push({x:this.x,y:this.y-35,vx:-this.vx*0.3+(Math.random()-0.5)*6,vy:(Math.random()-0.5)*8,life:0.5,color:this.color,size:Math.random()*4+2});}
  meleeAttack(o){if(this.attacking||!o.alive)return;this.attacking=true;this.attackTimer=10;const dx=o.x-this.x,dy=o.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<this.meleeRange&&Math.abs(dy)<55){AudioSystem.punch();const dm=this.isCPU?(this.diffMultiplier||1):1.0,ex=this.heavenlyBuff>0?1.5:1;o.takeDamage(this.meleeDmg*dm*ex,this.facingRight);this.cursedEnergy=Math.min(this.maxCE,this.cursedEnergy+this.ceGainOnHit);for(let i=0;i<10;i++)particles.push({x:o.x,y:o.y-35,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-3,life:0.4,color:'#fff',size:Math.random()*3+2});for(let i=0;i<8;i++)bloodDrops.push({x:o.x,y:o.y-30,vx:(Math.random()-0.5)*5+this.facingRight*3,vy:(Math.random()-0.5)*6-5,life:0.8,size:Math.random()*2+1});this.comboHits++;if(this.comboHits>=4){comboCount=this.comboHits;comboTimer=25;}screenShake=this.isBoss?8:5;if(!this.isCPU)showMessage(`${this.name.split(' ')[0]}!`);}}
  specialAttack(o,opps){if(this.cursedEnergy<100||!o.alive)return;this.attacking=true;this.attackTimer=18;this.cursedEnergy=0;this.auraActive=30;AudioSystem.special();const dm=this.isCPU?(this.diffMultiplier||1):1.0,all=opps||[o];if(this.powerType==='domain'&&this.domainType){AudioSystem.domain();domainActive=true;domainTimer=70;domainOwner=this;this.auraActive=60;screenShake=40;for(const op of all){if(!op.alive||op===this)continue;op.takeDamage(this.specialDmg*dm,this.facingRight);op.hitStun=25;}for(let i=0;i<150;i++)particles.push({x:this.x+(Math.random()-0.5)*400,y:this.y-50+(Math.random()-0.5)*300,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,life:1.8,color:this.powerColor,size:Math.random()*10+5});showMessage(`👹 ${this.name.split(' ')[0]}: ${this.powerName}!`);messageTimer=120;return;}for(const op of all){if(!op.alive||op===this)continue;op.takeDamage(this.specialDmg*dm,this.facingRight);op.hitStun=15;}for(let i=0;i<40;i++)particles.push({x:o.x+(Math.random()-0.5)*120,y:o.y-30+(Math.random()-0.5)*100,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12-5,life:1.1,color:this.powerColor,size:Math.random()*8+4});screenShake=25;showMessage(`💥 ${this.name.split(' ')[0]}: ${this.powerName}!`);if(!this.isCPU)messageTimer=90;}
  takeDamage(dmg,fr){if(this.invincible>0||!this.alive)return;AudioSystem.hurt();this.hp-=dmg;this.vy=-8;this.vx=(fr?1:-1)*10;this.hitStun=7;this.invincible=8;this.damageFlash=6;this.comboHits=0;this.cursedEnergy=Math.min(this.maxCE,this.cursedEnergy+this.ceGainOnDamage);for(let i=0;i<5;i++)bloodDrops.push({x:this.x,y:this.y-30,vx:(Math.random()-0.5)*4+(fr?2:-2),vy:(Math.random()-0.5)*5-4,life:0.6,size:Math.random()*2+1});if(this.hp<=0){this.hp=0;this.alive=false;for(let i=0;i<20;i++)bloodDrops.push({x:this.x,y:this.y-30,vx:(Math.random()-0.5)*15,vy:(Math.random()-0.5)*15-8,life:1.5,size:Math.random()*5+2});}}
  draw(ctx){if(!this.alive)return;ctx.save();ctx.translate(this.x,this.y);const dir=this.facingRight?1:-1,bob=this.grounded?Math.sin(this.walkCycle)*3:0;if(this.damageFlash>0){ctx.fillStyle=`rgba(255,0,0,${this.damageFlash/6*0.4})`;ctx.fillRect(-35,-100,70,150);}if(this.cursedEnergy>=100||this.auraActive>0){ctx.globalAlpha=(this.auraActive>0?this.auraActive/30:0.5+Math.sin(Date.now()*0.01)*0.3)*0.6;ctx.strokeStyle=this.powerColor;ctx.lineWidth=5;ctx.shadowColor=this.powerColor;ctx.shadowBlur=30;ctx.beginPath();ctx.arc(0,-45,55+Math.sin(Date.now()*0.005)*8,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}if(this.isBoss){ctx.globalAlpha=0.3;ctx.strokeStyle='#ff0000';ctx.lineWidth=4;ctx.shadowColor='#ff0000';ctx.shadowBlur=35;ctx.beginPath();ctx.arc(0,-45,65,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.ellipse(0,32,25,7,0,0,Math.PI*2);ctx.fill();ctx.translate(0,bob);ctx.lineCap='round';ctx.strokeStyle=this.color;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-8+Math.sin(this.walkCycle)*4,25);ctx.moveTo(0,0);ctx.lineTo(8-Math.sin(this.walkCycle)*4,25);ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(-10+Math.sin(this.walkCycle)*4,24,7,4);ctx.fillRect(3-Math.sin(this.walkCycle)*4,24,7,4);ctx.strokeStyle=this.color;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-38);ctx.stroke();ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(-10*dir,-14);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-28);if(this.attacking&&this.attackTimer>0){ctx.lineTo(25*dir,-19);ctx.lineTo(33*dir,-25);ctx.stroke();ctx.fillStyle=this.powerColor;ctx.shadowColor=this.powerColor;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(33*dir,-25,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}else{ctx.lineTo(12*dir,-14);ctx.stroke();}ctx.fillStyle=this.skinColor;ctx.strokeStyle=this.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-52,13,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=this.hairColor;ctx.beginPath();ctx.arc(0,-54,14,Math.PI,Math.PI*2);ctx.fill();if(this.accessory==='blindfold'){ctx.fillStyle='#1a1a2e';ctx.fillRect(-12,-54,24,5);}ctx.font='10px Arial';ctx.fillText(this.avatar,-5,-48);ctx.restore();ctx.fillStyle=this.isBoss?'#ff0000':'#fff';ctx.font=`bold ${this.isBoss?'10':'8'}px Arial`;ctx.textAlign='center';ctx.fillText(this.name.split(' ')[0],this.x,this.y-80);if(this.isBoss){const hpP=this.hp/this.maxHP;ctx.fillStyle='#333';ctx.fillRect(this.x-25,this.y-90,50,6);ctx.fillStyle=hpP>0.5?'#ffd700':'#ff4444';ctx.fillRect(this.x-25,this.y-90,50*hpP,6);}}
}

function showMessage(msg){message=msg;messageTimer=60;const el=document.getElementById('message-mk');el.textContent=msg;el.style.display='block';setTimeout(()=>{if(messageTimer<=0)el.style.display='none';},1200);}
function showBossAlert(){const a=document.getElementById('boss-alert');a.style.display='block';setTimeout(()=>{a.style.display='none';},2500);}
function updateMKHUD(){if(!player1||enemies.length===0)return;document.getElementById('hud-top').style.display='flex';document.getElementById('mk-p1-hp').style.width=Math.max(0,(player1.hp/player1.maxHP)*100)+'%';document.getElementById('mk-p1-ce').style.width=player1.cursedEnergy+'%';document.getElementById('mk-p1-avatar').textContent=player1.avatar;document.getElementById('mk-p1-name').textContent=player1.name.split(' ')[0];const mo=enemies[0];if(mo){document.getElementById('mk-p2-hp').style.width=Math.max(0,(mo.hp/mo.maxHP)*100)+'%';document.getElementById('mk-p2-ce').style.width=mo.cursedEnergy+'%';document.getElementById('mk-p2-avatar').textContent=mo.avatar;document.getElementById('mk-p2-name').textContent=mo.name.split(' ')[0];}document.getElementById('timer-mk').textContent=battleTimer;document.getElementById('combo-mk').textContent=comboTimer>0?`🔥 x${comboCount}`:'';if(gameMode==='arcade'){document.getElementById('tower-display').style.display='block';document.getElementById('tower-display').textContent=`🏰 TORRE ${towerLevel}/${maxTowers}`;}}
function showResultScreen(wn,aw){showingResult=true;const s=document.getElementById('result-screen');let b='';if(aw&&towerLevel<maxTowers)b=`<button class="result-btn" onclick="nextTower()">⚔️ PRÓXIMO</button><button class="result-btn" onclick="backToMenu()">🏠 MENU</button>`;else if(aw)b=`<button class="result-btn character" onclick="selectNewCharacterArcade()">👤 PERSONAGEM</button><button class="result-btn" onclick="backToMenu()">🏠 MENU</button>`;s.innerHTML=`<div class="result-title">${aw?(isBossFight?'🎉 BOSS DERROTADO!':'🏆 VITÓRIA!'):'💀 DERROTA'}</div><div class="result-winner">${wn} VENCEU!</div><div class="result-subtitle">Torre ${towerLevel}/${maxTowers}</div><div class="result-buttons">${b}</div>`;s.style.display='flex';}
function hideResultScreen(){document.getElementById('result-screen').style.display='none';showingResult=false;}
function nextTower(){hideResultScreen();towerLevel++;createArcadeGame(characters[selectedP1],difficulty);gameState='playing';}
function selectNewCharacterArcade(){hideResultScreen();towerLevel=1;maxTowers=getMaxTowers();selectedP1=null;isBossFight=false;showSelectionScreen();}
function backToMenu(){hideResultScreen();document.getElementById('game-over-screen').style.display='none';document.getElementById('hud-top').style.display='none';document.getElementById('tower-display').style.display='none';document.getElementById('message-mk').style.display='none';document.getElementById('boss-alert').style.display='none';gameState='menu';towerLevel=1;maxTowers=getMaxTowers();isBossFight=false;domainActive=false;clearInterval(timerInterval);AudioSystem.stopAllMusic();AudioSystem.playJJKTheme();}
function endGame(wp){clearInterval(timerInterval);winner=wp;domainActive=false;if(wp===player1){AudioSystem.victory();showMessage(`🏆 ${wp.name.split(' ')[0]} VENCEU!`);updateMKHUD();if(towerLevel>=maxTowers)setTimeout(()=>{gameState='victory';},1500);setTimeout(()=>showResultScreen(wp.name,true),1500);}else{AudioSystem.defeat();updateMKHUD();showGameOver();}}
function showGameOver(){gameState='gameover';document.getElementById('game-over-screen').innerHTML=`<div class="game-over-title">GAME OVER</div><div class="game-over-subtitle">Torre ${towerLevel}/${maxTowers}${isBossFight?' - Derrotado pelo Boss!':''}</div><div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;"><button class="result-btn rematch" onclick="restartArcade()">🔄 TENTAR</button><button class="result-btn character" onclick="selectNewCharacterArcade()">👤 PERSONAGEM</button><button class="result-btn" onclick="backToMenu()">🏠 MENU</button></div>`;document.getElementById('game-over-screen').style.display='flex';}
function restartArcade(){document.getElementById('game-over-screen').style.display='none';towerLevel=1;maxTowers=getMaxTowers();createArcadeGame(characters[selectedP1],difficulty);gameState='playing';}
function createArcadeGame(p1d,diff){player1=new JujutsuFighter(120,GROUND-50,p1d,false);player1.facingRight=true;enemies=[];isBossFight=(towerLevel===maxTowers);domainActive=false;bloodDrops=[];particles=[];if(isBossFight){const b=new JujutsuFighter(W-180,GROUND-50,bossSukuna,true,diff,true);b.facingRight=false;enemies.push(b);AudioSystem.bossAppear();AudioSystem.stopAllMusic();AudioSystem.playBossMusic();showBossAlert();showMessage('👹 SUKUNA!');}else{const e=new JujutsuFighter(W-180,GROUND-50,characters[Math.floor(Math.random()*characters.length)],true,diff);e.facingRight=false;enemies.push(e);AudioSystem.stopAllMusic();AudioSystem.playBattleMusic();showMessage(`⚔️ ${e.name.split(' ')[0]}!`);}winner=null;battleTimer=99;screenShake=0;comboCount=0;comboTimer=0;showingResult=false;clearInterval(timerInterval);startBattleTimer();updateMKHUD();}
function startBattleTimer(){timerInterval=setInterval(()=>{if(gameState!=='playing'||paused||showingResult)return;battleTimer--;if(battleTimer<=10&&battleTimer>0)AudioSystem.playNote(440,'square',0.05,0.02);if(battleTimer<=0){clearInterval(timerInterval);if(!winner){if(!enemies.every(e=>!e.alive))showGameOver();else endGame(player1);}}if(domainActive&&domainTimer>0){domainTimer--;if(domainTimer<=0)domainActive=false;}updateMKHUD();},1000);}

function showSelectionScreen(){
  const s=document.getElementById('selection-screen');
  let h=`<div class="selection-title">ESCOLHA SEU LUTADOR</div><div class="selection-subtitle">20 PERSONAGENS</div><div class="character-grid-mk3">`;
  characters.forEach((c,i)=>{h+=`<div class="char-card-mk3 ${selectedP1===i?'selected':''}" ontouchstart="selectCharacter(${i})" onclick="selectCharacter(${i})"><div class="char-avatar-mk3">${c.avatar}</div><div class="char-name-mk3">${c.name.split(' ')[0]}</div><div class="char-title-mk3">${c.title}</div><div class="char-stats-mk3"><div class="char-stat-mk3"><div class="char-stat-val-mk3">❤️${c.hp}</div></div><div class="char-stat-mk3"><div class="char-stat-val-mk3">⚡${c.speed}</div></div></div><div class="char-power-mk3">⭐ ${c.power.split(' ')[0]}</div></div>`;});
  h+=`</div><div class="selection-subtitle" style="margin-top:6px;">DIFICULDADE DO BOT</div><div class="diff-select">`;
  h+=`<button class="diff-btn ${difficulty==='easy'?'selected':''}" ontouchstart="setDifficulty('easy')" onclick="setDifficulty('easy')">FÁCIL</button>`;
  h+=`<button class="diff-btn ${difficulty==='normal'?'selected':''}" ontouchstart="setDifficulty('normal')" onclick="setDifficulty('normal')">NORMAL</button>`;
  h+=`<button class="diff-btn ${difficulty==='hard'?'selected':''}" ontouchstart="setDifficulty('hard')" onclick="setDifficulty('hard')">DIFÍCIL</button>`;
  h+=`</div><button class="goty-btn start-btn" ontouchstart="startArcade()" onclick="startArcade()">⚡ INICIAR (${getMaxTowers()} TORRES) ⚡</button>`;
  s.innerHTML=h;s.style.display='flex';
}
function selectCharacter(i){AudioSystem.select();selectedP1=i;showSelectionScreen();}
function setDifficulty(d){AudioSystem.menuClick();difficulty=d;maxTowers=getMaxTowers();showSelectionScreen();}
function startArcade(){if(selectedP1===null){alert('Selecione um personagem!');return;}document.getElementById('selection-screen').style.display='none';maxTowers=getMaxTowers();towerLevel=1;selectedMap=Math.floor(Math.random()*maps.length);isBossFight=false;domainActive=false;createArcadeGame(characters[selectedP1],difficulty);gameState='playing';}

function drawMenu(){
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#8A2BE2';ctx.font='bold 35px Orbitron, Arial';ctx.textAlign='center';ctx.shadowColor='#bb44ff';ctx.shadowBlur=35;
  ctx.fillText('JUJUTSU KAISEN',W/2,H*0.2);ctx.fillText('ARENA SAGRADA',W/2,H*0.3);ctx.shadowBlur=0;
  ctx.fillStyle='#ffd700';ctx.font='11px Orbitron, Arial';ctx.fillText('GOTY EDITION',W/2,H*0.36);
  if(drawButton(W/2-W*0.13,H*0.45,W*0.26,H*0.08,'🎮 JOGAR','#e74c3c',16)){AudioSystem.menuClick();selectedP1=null;showSelectionScreen();}
  ctx.fillStyle='#aaa';ctx.font='bold 8px Orbitron, Arial';ctx.textAlign='center';ctx.fillText('CRIADOR: Davi Lopes Cabral',W/2,H*0.75);
  ctx.fillStyle='#888';ctx.font='bold 7px Orbitron, Arial';ctx.fillText('DESENVOLVEDOR: Alan Filho',W/2,H*0.8);
}
function drawButton(x,y,w,h,t,c,f){const hv=mouseX>=x&&mouseX<=x+w&&mouseY>=y&&mouseY<=y+h;ctx.fillStyle=hv?'#fff':c;ctx.fillRect(x,y,w,h);ctx.strokeStyle=hv?'#ffd700':'#fff';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.fillStyle=hv?'#000':'#fff';ctx.font=`bold ${f}px Orbitron, Arial`;ctx.textAlign='center';ctx.fillText(t,x+w/2,y+h/2+4);return hv&&clicked;}

function drawDomainBackground(){if(!domainActive||!domainOwner)return;const a=Math.min(0.5,(70-domainTimer)/30)*0.5;ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.fillRect(0,0,W,H);const dt=domainOwner.domainType||'malevolent_shrine';if(dt==='malevolent_shrine'){ctx.fillStyle=`rgba(139,0,0,${a*0.4})`;ctx.fillRect(0,GROUND,W,H-GROUND);for(let i=0;i<5;i++){ctx.strokeStyle=`rgba(150,20,20,${a})`;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(W/2-150+i*60,40);ctx.lineTo(W/2-160+i*60+Math.sin(frameCount*0.04+i)*20,8);ctx.stroke();}}}

function gameLoop(){
  if(!paused)frameCount++;
  W=canvas.width;H=canvas.height;GROUND=H*0.78;
  const m=maps[selectedMap];
  ctx.fillStyle=m.bg;ctx.fillRect(0,0,W,GROUND);
  ctx.fillStyle=m.ground;ctx.fillRect(0,GROUND,W,H-GROUND);
  if(domainActive&&domainTimer>0)drawDomainBackground();
  bloodDrops.forEach(b=>{if(b.ground&&b.life>0.5){ctx.fillStyle=`rgba(139,0,0,${(b.life-0.5)*0.3})`;ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();}});
  ctx.strokeStyle=m.line;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  if(gameState==='menu'){drawMenu();}
  else if(gameState==='playing'){
    if(!paused&&!showingResult){
      const p1c={left:'a',right:'d',jump:'w',attack:'x',special:'c',dash:'v'};
      const af=[player1,...enemies];
      player1.update(p1c,af);enemies.forEach(e=>e.update(null,af));
      for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;if(!p.domainParticle&&!p.ground)p.vy+=0.2;p.life-=0.012;if(p.life<=0)particles.splice(i,1);}
      for(let i=bloodDrops.length-1;i>=0;i--){const b=bloodDrops[i];b.x+=b.vx;b.y+=b.vy;b.vy+=0.4;if(b.y>=GROUND-2){b.y=GROUND-2;b.vy=0;b.vx*=0.3;b.ground=true;}b.life-=0.008;if(b.life<=0)bloodDrops.splice(i,1);}
      if(messageTimer>0){messageTimer--;if(messageTimer<=0)document.getElementById('message-mk').style.display='none';}
      if(screenShake>0)screenShake--;if(comboTimer>0){comboTimer--;if(comboTimer<=0)comboCount=0;}
      if(!player1.alive&&!winner)endGame(enemies[0]||player1);
      else if(enemies.every(e=>!e.alive)&&!winner)endGame(player1);
      updateMKHUD();
    }
    const sx=screenShake>0?(Math.random()-0.5)*screenShake:0,sy=screenShake>0?(Math.random()-0.5)*screenShake:0;
    ctx.save();ctx.translate(sx,sy);
    player1.draw(ctx);enemies.forEach(e=>e.draw(ctx));
    for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;if(p.domainParticle){ctx.shadowColor=p.color;ctx.shadowBlur=10;}ctx.beginPath();ctx.arc(p.x,p.y,p.size||2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    for(const b of bloodDrops){if(b.ground){ctx.fillStyle=`rgba(139,0,0,${b.life*0.4})`;ctx.beginPath();ctx.ellipse(b.x,b.y,b.size,b.size*0.3,0,0,Math.PI*2);ctx.fill();}else{ctx.fillStyle=`rgba(220,20,20,${b.life})`;ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();}}
    ctx.globalAlpha=1;ctx.restore();
  }else if(gameState==='victory'){ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffd700';ctx.font='bold 25px Orbitron, Arial';ctx.textAlign='center';ctx.fillText('🎉 TODAS AS TORRES CONQUISTADAS! 🎉',W/2,H*0.4);ctx.fillText('BOSS SUKUNA DERROTADO!',W/2,H*0.5);}
  clicked=false;requestAnimationFrame(gameLoop);
}

AudioSystem.init();resizeCanvas();gameLoop();
</script>
</body>
